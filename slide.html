<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dynamic Nature Slider</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Segoe UI", Roboto, sans-serif;
      }

      body {
        background-color: #080a08;
        color: #ffffff;
        overflow: hidden;
      }

      .navbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 25px 40px;
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 100;
        background: linear-gradient(
          to bottom,
          rgba(0, 0, 0, 0.7),
          rgba(0, 0, 0, 0)
        );
      }

      .logo {
        color: #ffffff;
        font-weight: 800;
        font-size: 24px;
        letter-spacing: 4px;
        text-transform: uppercase;
        border-left: 4px solid #2ecc71;
        padding-left: 12px;
      }

      .nav-links {
        display: flex;
        list-style: none;
        gap: 30px;
      }

      .nav-links a {
        color: #e0e0e0;
        text-decoration: none;
        font-size: 15px;
        font-weight: 500;
        letter-spacing: 1px;
      }

      .nav-links a:hover {
        color: #27ae60;
      }
      .slider-viewport {
        position: relative;
        width: 100%;
        height: 100vh;
      }

      .slider-viewport img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        position: absolute;
        inset: 0;
        z-index: 1;
      }

      .slider-viewport::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(
          to top,
          rgba(8, 10, 8, 1) 15%,
          rgba(8, 10, 8, 0.2) 60%,
          rgba(0, 0, 0, 0.3) 100%
        );
        z-index: 2;
      }

      .slide-content {
        position: absolute;
        bottom: 15%;
        left: 6%;
        z-index: 10;
        max-width: 650px;
      }

      .slide-content h2 {
        font-size: 55px;
        font-weight: 700;
        letter-spacing: 1px;
        margin-bottom: 15px;
        text-shadow: 2px 4px 15px rgba(0, 0, 0, 0.6);
      }

      .slide-content p {
        font-size: 16px;
        color: #d1d5db;
        line-height: 1.7;
        margin-bottom: 30px;
      }

      .cta-btn {
        background-color: #2ecc71;
        color: white;
        border: none;
        padding: 14px 35px;
        font-size: 14px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 2px;
        cursor: pointer;
        border-radius: 50px;
        box-shadow: 0 4px 15px rgba(46, 204, 113, 0.3);
        transition: all 0.3s ease;
      }

      .cta-btn:hover {
        background-color: #27ae60;
        transform: translateY(-2px);
      }

      .btn {
        position: absolute;
        bottom: 15%;
        background-color: rgba(255, 255, 255, 0.08);

        color: white;
        border: 1px solid rgba(255, 255, 255, 0.15);
        width: 60px;
        height: 60px;
        font-size: 20px;
        cursor: pointer;
        z-index: 20;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
      }

      .btn:hover {
        background-color: #2ecc71;
        border-color: #2ecc71;
      }

      .prev-btn {
        right: 140px;
      }
      .next-btn {
        right: 60px;
      }
    </style>
  </head>
  <body>
    <nav class="navbar">
      <div class="logo">Earthy</div>
      <ul class="nav-links">
        <li><a href="#">Explore</a></li>
        <li><a href="#">Destinations</a></li>
        <li><a href="#">Gallery</a></li>
      </ul>
    </nav>

    <div class="slider-viewport">
      <div id="container"></div>

      <div class="slide-content">
        <h2 id="slide-title">Loading...</h2>
        <p id="slide-desc">Please wait while the ecosystem renders.</p>
        <button class="cta-btn">Discover More</button>
      </div>

      <button class="btn prev-btn" id="prev">❮</button>
      <button class="btn next-btn" id="next">❯</button>
    </div>

    <script src="slide.js"></script>
  </body>
</html>
